<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        #container {
            width: 400px;
        }

        #chat-box {
            height: 400px;
            border: 1px solid #444;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
            background: #1a1a1a;
        }

        .user {
            text-align: right;
            color: #4da6ff;
            margin: 5px;
        }

        .bot {
            text-align: left;
            color: #00ff99;
            margin: 5px;
        }

        input {
            width: 75%;
            padding: 10px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div id="container">
    <h2>AI Chatbot</h2>

    <div id="chat-box"></div>

    <input id="user-input" placeholder="Type message..." />
    <button id="send-btn">Send</button>
</div>

<!-- IMPORTANT -->
<script src="/static/script.js"></script>

</body>
</html>
